<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ops Monitor Overview</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap");

    :root {
      color-scheme: dark;
      --bg: #06111d;
      --bg-deep: #08192b;
      --surface: rgba(10, 24, 40, 0.84);
      --surface-strong: rgba(14, 31, 50, 0.94);
      --surface-soft: rgba(9, 20, 34, 0.76);
      --text: #edf4ff;
      --muted: #8fa6c4;
      --line: rgba(156, 191, 255, 0.14);
      --line-strong: rgba(156, 191, 255, 0.22);
      --shadow: 0 26px 60px rgba(0, 0, 0, 0.36);
      --ok: #7ff0b0;
      --ok-bg: rgba(14, 86, 49, 0.42);
      --warn: #ffd97a;
      --warn-bg: rgba(102, 73, 11, 0.38);
      --fail: #ffb7c6;
      --fail-bg: rgba(112, 23, 49, 0.42);
      --link: #8bdcff;
      --accent: #6ed6ff;
      --accent-soft: rgba(110, 214, 255, 0.16);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(720px 380px at 8% -8%, rgba(62, 102, 182, 0.34) 0%, transparent 62%),
        radial-gradient(620px 340px at 92% 0%, rgba(29, 195, 214, 0.2) 0%, transparent 58%),
        linear-gradient(180deg, #07111c 0%, var(--bg) 50%, #050d17 100%);
      line-height: 1.5;
      min-height: 100vh;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 18px 56px;
    }
    h1 {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .subtle {
      color: var(--muted);
      margin: 0;
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        var(--surface);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .hero {
      position: relative;
      overflow: hidden;
      padding: 24px;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(540px 220px at 100% 0%, rgba(110, 214, 255, 0.18) 0%, transparent 62%),
        radial-gradient(480px 240px at 0% 0%, rgba(84, 120, 255, 0.12) 0%, transparent 58%),
        linear-gradient(180deg, rgba(14, 31, 50, 0.96), rgba(8, 20, 35, 0.94));
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(255, 255, 255, 0.08), transparent 34%),
        linear-gradient(transparent, rgba(255, 255, 255, 0.015));
      pointer-events: none;
    }
    .hero-copy,
    .counts,
    .repo-grid,
    #feedback {
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(139, 220, 255, 0.18);
      background: rgba(110, 214, 255, 0.1);
      color: #c8ecff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .hero-lede {
      max-width: 66ch;
      margin-top: 14px;
      font-size: 1rem;
      color: #b6cae5;
    }
    .counts {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 12px;
    }
    .count-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .count-value {
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .repo-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .repo-name {
      margin: 0;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: 1.14rem;
      line-height: 1.15;
      word-break: break-word;
      color: #f5f9ff;
    }
    .repo-meta {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 0.9rem;
    }
    .repo-meta > div {
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--surface-soft);
      border: 1px solid rgba(156, 191, 255, 0.1);
    }
    .repo-meta strong,
    .card-kicker {
      color: var(--muted);
      display: block;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .help {
      cursor: help;
      border-bottom: 1px dotted rgba(143, 166, 196, 0.7);
    }
    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-left: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .OK {
      color: var(--ok);
      background: var(--ok-bg);
    }
    .WARN {
      color: var(--warn);
      background: var(--warn-bg);
    }
    .FAIL {
      color: var(--fail);
      background: var(--fail-bg);
    }
    .warn-text {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(7, 16, 28, 0.58);
      border: 1px solid rgba(156, 191, 255, 0.08);
      color: #bdd0e9;
      font-size: 0.92rem;
      white-space: normal;
      word-break: break-word;
    }
    .detail-link {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(139, 220, 255, 0.18);
      background: rgba(110, 214, 255, 0.09);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }
    .link-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .link-row .detail-link {
      margin-top: 0;
    }
    .detail-link:hover {
      text-decoration: none;
      border-color: rgba(139, 220, 255, 0.36);
      background: rgba(110, 214, 255, 0.16);
      transform: translateY(-1px);
    }
    .empty,
    .error {
      margin-top: 18px;
      border-left: 4px solid var(--line-strong);
      padding: 14px 16px;
      background: var(--surface);
      border-radius: 18px;
      color: var(--muted);
    }
    .error {
      border-left-color: var(--fail);
    }
    @media (max-width: 760px) {
      main {
        padding: 22px 14px 36px;
      }
      .hero {
        padding: 18px;
      }
      .counts {
        grid-template-columns: 1fr;
      }
      .repo-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero card">
      <div class="hero-copy">
        <div class="eyebrow">Unified Repo Telemetry</div>
        <h1>Ops Monitor</h1>
        <p class="hero-lede">One dark-room console for probe health, freshness, schema drift, and workflow signals across your monitored repos.</p>
        <p class="subtle" id="generated">Loading latest health summary...</p>
      </div>
      <section class="counts" id="counts" aria-label="Status counts"></section>
    </section>
    <section class="repo-grid" id="repos" aria-label="Repository health cards"></section>
    <div id="feedback"></div>
  </main>
  <script>
    (function () {
      var STATUS_ORDER = { FAIL: 0, WARN: 1, OK: 2 };
      var APP_URLS = {
        "yt-codex/amenities-dashboard": "https://yt-codex.github.io/amenities-dashboard/web/",
        "yt-codex/sg-developers-health-monitor": "https://yt-codex.github.io/sg-developers-health-monitor/index.html"
      };
      var countsEl = document.getElementById("counts");
      var reposEl = document.getElementById("repos");
      var feedbackEl = document.getElementById("feedback");
      var generatedEl = document.getElementById("generated");

      function text(value, fallback) {
        if (value === null || value === undefined || value === "") {
          return fallback;
        }
        return String(value);
      }

      function countCard(label, value, statusClass) {
        var card = document.createElement("article");
        card.className = "card";
        var labelEl = document.createElement("div");
        labelEl.className = "count-label";
        labelEl.textContent = label;
        var valueEl = document.createElement("div");
        valueEl.className = "count-value";
        valueEl.textContent = text(value, "0");
        if (statusClass) {
          var badge = document.createElement("span");
          badge.className = "badge " + statusClass;
          badge.textContent = statusClass;
          valueEl.appendChild(badge);
        }
        card.appendChild(labelEl);
        card.appendChild(valueEl);
        return card;
      }

      function repoMetaItem(label, value, tooltip) {
        var wrap = document.createElement("div");
        var strong = document.createElement("strong");
        strong.textContent = label;
        if (tooltip) {
          strong.className = "help";
          strong.title = tooltip;
        }
        var body = document.createElement("div");
        body.textContent = text(value, "n/a");
        wrap.appendChild(strong);
        wrap.appendChild(body);
        return wrap;
      }

      function render(summary) {
        var detailBasePath = window.__OPS_MONITOR_SUMMARY_BASE_PATH__ || "./docs/";
        var counts = summary && summary.counts ? summary.counts : {};
        countsEl.innerHTML = "";
        countsEl.appendChild(countCard("OK", counts.OK || 0, "OK"));
        countsEl.appendChild(countCard("WARN", counts.WARN || 0, "WARN"));
        countsEl.appendChild(countCard("FAIL", counts.FAIL || 0, "FAIL"));

        var repos = summary && Array.isArray(summary.repos) ? summary.repos.slice() : [];
        repos.sort(function (a, b) {
          var left = STATUS_ORDER[text(a.severity, "OK")] || 99;
          var right = STATUS_ORDER[text(b.severity, "OK")] || 99;
          if (left !== right) return left - right;
          return text(a.full_name, "").localeCompare(text(b.full_name, ""));
        });

        reposEl.innerHTML = "";
        feedbackEl.innerHTML = "";

        if (!repos.length) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No repos found in latest summary.";
          feedbackEl.appendChild(empty);
          return;
        }

        repos.forEach(function (repo) {
          var card = document.createElement("article");
          card.className = "card";

          var title = document.createElement("h2");
          title.className = "repo-name";
          title.textContent = text(repo.full_name, "unknown/repo");

          var sev = text(repo.severity, "OK");
          var badge = document.createElement("span");
          badge.className = "badge " + sev;
          badge.textContent = sev;
          title.appendChild(badge);
          card.appendChild(title);

          var meta = document.createElement("div");
          meta.className = "repo-meta";
          meta.appendChild(repoMetaItem(
            "Last Run",
            repo.last_run_time || "n/a",
            "UTC timestamp of the latest emitted probe run."
          ));
          meta.appendChild(repoMetaItem(
            "Freshness Lag",
            repo.freshness_lag_human || "n/a",
            "How stale data is: now minus freshness.max_date (or last_run_time when max_date is missing)."
          ));
          meta.appendChild(repoMetaItem(
            "Duration",
            repo.duration_human || "n/a",
            "Runtime reported by the probe for the latest run."
          ));
          meta.appendChild(repoMetaItem("Probe Status", repo.status || "n/a"));
          card.appendChild(meta);

          var warning = document.createElement("div");
          warning.className = "warn-text";
          warning.textContent = "Top warning: " + text(repo.top_warning, "none");
          card.appendChild(warning);

          var linkRow = document.createElement("div");
          linkRow.className = "link-row";

          var detail = document.createElement("a");
          detail.className = "detail-link";
          detail.href = detailBasePath + text(repo.detail_page, text(repo.slug, "") + ".html");
          detail.textContent = "Open monitor detail";
          linkRow.appendChild(detail);

          var appUrl = text(repo.app_url, "") || APP_URLS[text(repo.full_name, "")];
          if (appUrl) {
            var app = document.createElement("a");
            app.className = "detail-link";
            app.href = appUrl;
            app.textContent = "Open project site";
            linkRow.appendChild(app);
          }

          card.appendChild(linkRow);

          reposEl.appendChild(card);
        });
      }

      async function load() {
        var summaryCandidates = ["./latest.json", "./docs/latest.json"];
        try {
          var res = null;
          var summaryBasePath = "./docs/";
          for (var i = 0; i < summaryCandidates.length; i += 1) {
            var candidate = summaryCandidates[i];
            var attempt = await fetch(candidate, { cache: "no-store" });
            if (attempt.ok) {
              res = attempt;
              summaryBasePath = candidate.slice(0, candidate.lastIndexOf("/") + 1);
              break;
            }
          }
          if (!res) {
            throw new Error("Summary JSON not found.");
          }
          var summary = await res.json();
          window.__OPS_MONITOR_SUMMARY_BASE_PATH__ = summaryBasePath;
          generatedEl.textContent =
            "Generated: " + text(summary.generated_at, "n/a") +
            " | Apps: " + text(summary.repo_count, "0");
          render(summary);
        } catch (err) {
          countsEl.innerHTML = "";
          reposEl.innerHTML = "";
          generatedEl.textContent = "Could not load latest health summary.";
          var error = document.createElement("div");
          error.className = "error";
          error.textContent =
            "Failed to load latest.json or docs/latest.json. Run the monitor workflow and ensure docs artifacts are published.";
          feedbackEl.appendChild(error);
        }
      }

      load();
    })();
  </script>
</body>
</html>
